<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rosmin & Antony | Wedding Invitation</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@400;500;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<section class="hero">

<div class="hero-overlay"></div>

<div class="hero-content">

<div class="cross">✝</div>

<p class="verse">
"Give thanks to the Lord, for He is good;
His love endures forever."
</p>

<p class="psalm">
Psalm 107:1
</p>

<h2>Together with our families</h2>

<h1>

<span class="bride">
Rosmin
</span>

<span class="heart">
♥
</span>

<span class="groom">
Antony
</span>

</h1>

<p class="subtitle">

joyfully invite you to celebrate
our marriage.

</p>

<div class="date">

29 July 2026

</div>

<button id="openInvitation">

Open Invitation

</button>

</div>

</section>



<section id="selection">

<h2>

Choose Your Invitation

</h2>

<div class="cards">

<div class="card">

<h3>

Bride's Family

</h3>

<p>

Betrothal Invitation

</p>

<button>

View Invitation

</button>

</div>

<div class="card">

<h3>

Groom's Family

</h3>

<p>

Wedding Invitation

</p>

<button>

View Invitation

</button>

</div>

</div>

</section>

<script src="script.js"></script>

</body>

</html>
